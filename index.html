<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zeroCO2 Goals 2026</title>
    <meta name="description" content="Internal zeroCO2 dashboard for tracking 2026 goals." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="loginView" class="login-shell hidden">
      <div class="page-logo">
        <img src="logo.png" alt="zeroCO2 logo" />
      </div>
      <div class="login-card">
        <div class="site-brand">
          <div>
            <p class="eyebrow">Goals dashboard</p>
            <h1>zeroCO2</h1>
          </div>
        </div>
        <form id="loginForm" class="login-form">
          <label for="passwordInput">Shared password</label>
          <input id="passwordInput" name="password" type="password" placeholder="Enter shared password" autocomplete="current-password" required />
          <button type="submit">Log in</button>
          <p id="loginError" class="login-error" aria-live="polite"></p>
        </form>
      </div>
    </div>

    <div id="dashboardView" class="dashboard-shell">
      <header class="topbar">
        <div class="site-brand">
          <div>
            <p class="eyebrow">Shared goals 2026</p>
            <h1>zeroCO2</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="refreshButton" class="ghost-button" type="button">Refresh</button>
          <p id="lastUpdated" class="timestamp">Last update: —</p>
        </div>
      </header>

      <div id="statusMessage" class="status-message" role="status"></div>
      <section id="cardsGrid" class="cards-grid" aria-label="Goals"></section>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
